<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crawler</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #637083;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    form {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 170px 120px auto;
      gap: 12px;
      align-items: end;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      color: var(--text);
      font: inherit;
      background: #fff;
    }

    input:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(15, 118, 110, 0.16);
    }

    button {
      height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .status {
      min-height: 24px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    .results {
      display: grid;
      gap: 10px;
    }

    .result {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .result-header {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: start;
    }

    .result a {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .result a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .score {
      flex: 0 0 auto;
      border: 1px solid rgba(15, 118, 110, 0.28);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 700;
      background: rgba(15, 118, 110, 0.08);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 24px, 1100px);
        padding: 20px 0;
      }

      form {
        grid-template-columns: 1fr;
      }

      .result-header {
        display: grid;
      }

      .score {
        width: max-content;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Crawler</h1>

    <form id="search-form">
      <label>
        Keyword
        <input id="keyword" name="keyword" value="AI" required>
      </label>
      <label>
        Category
        <input id="category" name="category" value="company" required>
      </label>
      <label>
        Max pages
        <input id="max-pages" name="max_pages" type="number" min="1" max="50" value="20" required>
      </label>
      <button id="submit" type="submit">Search</button>
    </form>

    <div id="status" class="status">Ready</div>
    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <script>
    const form = document.querySelector("#search-form");
    const submit = document.querySelector("#submit");
    const statusEl = document.querySelector("#status");
    const resultsEl = document.querySelector("#results");
    let stream = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function addResult(site) {
      const article = document.createElement("article");
      article.className = "result";

      const header = document.createElement("div");
      header.className = "result-header";

      const link = document.createElement("a");
      link.href = site.url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = site.title || site.domain;

      const score = document.createElement("span");
      score.className = "score";
      score.textContent = `${site.relevance_score}%`;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${site.domain} · ${site.reason}`;

      header.append(link, score);
      article.append(header, meta);
      resultsEl.append(article);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (stream) {
        stream.close();
      }

      resultsEl.replaceChildren();
      submit.disabled = true;
      setStatus("Starting search");

      const params = new URLSearchParams(new FormData(form));
      stream = new EventSource(`/crawl/discover/stream?${params.toString()}`);

      stream.addEventListener("status", (event) => {
        const payload = JSON.parse(event.data);
        setStatus(payload.message);
      });

      stream.addEventListener("result", (event) => {
        const site = JSON.parse(event.data);
        addResult(site);
        setStatus(`Found ${resultsEl.children.length} result${resultsEl.children.length === 1 ? "" : "s"}`);
      });

      stream.addEventListener("done", (event) => {
        const payload = JSON.parse(event.data);
        setStatus(`Done. Found ${payload.count} result${payload.count === 1 ? "" : "s"}.`);
        submit.disabled = false;
        stream.close();
        stream = null;
      });

      stream.addEventListener("failure", (event) => {
        const payload = JSON.parse(event.data);
        setStatus(payload.message, true);
        submit.disabled = false;
        stream.close();
        stream = null;
      });

      stream.addEventListener("error", () => {
        setStatus("Search stream disconnected", true);
        submit.disabled = false;
        stream.close();
        stream = null;
      });
    });
  </script>
</body>
</html>
